<div class="contenedor-formulario">
  <h2>Crear Muestra</h2>

  <mat-form-field appearance="fill" class="campo-completo">
    <mat-label>Espectrometro</mat-label>
    <mat-select [(ngModel)]="registro.espectrometro_id" (selectionChange)="actualizarSondas()">
      <mat-option *ngFor="let esp of espectrometros" [value]="esp.id">{{ esp.nombre }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" class="campo-completo">
    <mat-label>Sonda</mat-label>
    <mat-select [(ngModel)]="registro.sonda" [disabled]="!registro.espectrometro_id">
      <mat-option *ngFor="let sonda of sondasDisponibles" [value]="sonda">{{ sonda }}</mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Fecha actual (zona horaria Madrid): solo lectura -->
  <mat-form-field appearance="fill" class="campo-completo">
    <mat-label>Fecha de entrada</mat-label>
    <input matInput type="date" [(ngModel)]="registro.fechaEntrada" [readonly]="true">
  </mat-form-field>

  <mat-form-field appearance="fill" class="campo-completo">
    <mat-label>Nombre de la muestra</mat-label>
    <input matInput type="text" [(ngModel)]="registro.nombreMuestra">
  </mat-form-field>

  <div class="opciones-checkbox">
    <mat-checkbox [(ngModel)]="registro.finalizado"      color="primary">Finalizado</mat-checkbox>
    <mat-checkbox [(ngModel)]="registro.recuperarMuestra" color="primary">Recuperar muestra</mat-checkbox>
  </div>

  <button mat-raised-button color="primary" class="boton-guardar" (click)="guardarMuestra()">
    Guardar muestra
  </button>

  <!-- Grafico de uso de sondas para el espectrometro seleccionado -->
  <app-grafico-espectrometro
    *ngIf="espectrometroSeleccionado"
    [espectrometroId]="espectrometroSeleccionado.id"
    [nombreEspectrometro]="espectrometroSeleccionado.nombre"
    [sondas]="espectrometroSeleccionado.sondas"
    [registros]="misRegistros">
  </app-grafico-espectrometro>

</div>
